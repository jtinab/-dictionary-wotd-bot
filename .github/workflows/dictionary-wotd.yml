name: Dictionary.com Word of the Day

on:
  schedule:
    # 14:00 UTC = 10:00 PM Singapore Time (UTC+8)
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-word:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dictionary.com word of the day script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python dictionary_wotd.py

      - name: Upload debug page text (for fixing parsing if it ever breaks)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-dump
          path: debug/
          retention-days: 3
          if-no-files-found: ignore

      - name: Save updated state
        run: |
          git config user.name "dotd-bot"
          git config user.email "dotd-bot@users.noreply.github.com"
          git add last_sent.json
          git diff --quiet --cached || git commit -m "Update last sent word"
          git push
